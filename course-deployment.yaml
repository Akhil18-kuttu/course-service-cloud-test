apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: cloudstudents
  name: deployment-course-akhil
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: app-course-akhil
  replicas: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: app-course-akhil
    spec:
      containers:
      - image: 991524241826.dkr.ecr.ap-south-2.amazonaws.com/course-repo/akhil:latest
        imagePullPolicy: Always
        name: app-course-akhil
        ports:
        - containerPort: 3001
---
apiVersion: v1
kind: Service
metadata:
  namespace: cloudstudents
  name: service-course-akhil
spec:
  ports:
    - port: 80         
      targetPort: 3001  
      protocol: TCP
  type: NodePort
  selector:
    app.kubernetes.io/name: app-course-akhil
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  namespace: cloudstudents
  name: ingress-course-akhil
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: service-course-akhil
              port:
                number: 80   
